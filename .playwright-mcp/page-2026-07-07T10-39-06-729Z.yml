        - heading "What is negotiation in procurement?" [level=2] [ref=f117e97]
        - paragraph [ref=f117e98]: Negotiation is important within our profession. It's the communication between two or more parties with the aim of reaching a mutual agreement.
        - paragraph [ref=f117e99]: "There are several reasons for negotiations:"
        - generic [ref=f117e100]:
          - list [ref=f117e102]:
            - listitem [ref=f117e103]: "Costs: To reduce the cost of acquisition by achieving a lower price"
            - listitem [ref=f117e104]: "Value: To achieve added value such as reduced lead or cycle times"
            - listitem [ref=f117e105]: "Performance: To improve performance through KPIs' and SLA's"
            - listitem [ref=f117e106]: "Conflict: To resolve conflict through reaching understanding"
          - list [ref=f117e108]:
            - listitem [ref=f117e109]: "Problem: To solve a problem by having an open discussion"
            - listitem [ref=f117e110]: "Quality: To achieve optimum quality through reducing defects"
            - listitem [ref=f117e111]: "Agreement: To reach a mutual agreement in a collaborative style where all parties are satisfied."
