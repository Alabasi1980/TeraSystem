      - generic [ref=f117e191]:
        - heading "What is supplier negotiation?" [level=2] [ref=f117e192]
        - paragraph [ref=f117e193]: Supplier negotiation is the process of negotiation favourable terms are part of a new contract. You can negotiate different terms with existing suppliers or discuss terms with a brand new supplier. Negotiation is a key activity for procurement and supply professionals, and you should prepare a strategy for any negotiations.
      - generic [ref=f117e196]:
        - heading "How to negotiate with powerful suppliers" [level=2] [ref=f117e197]
        - paragraph [ref=f117e198]: It’s important to spend time building your supplier relationships and finding mutual interests, especially if they are powerful suppliers. Find new ways to bring value to your supplier, this could be by being the gateway to new markets or finding innovative ways to reduce the supplier’s risks. Think about purchasing bundles, volumes and consolidate purchase orders, these all will help your negotiation position. Importantly, define what makes you successful and use it to your advantage.
      - generic [ref=f117e201]:
        - heading "Setting objectives with suppliers" [level=2] [ref=f117e202]
        - paragraph [ref=f117e203]: Setting objectives with your suppliers will contribute to the success of your working relationship. Establishing smart goals keeps everyone focused, aligns efforts and drives continuous improvements, as well as setting clear expectations.
        - list [ref=f117e204]:
          - listitem [ref=f117e205]: Specific
          - listitem [ref=f117e206]: Measurable
          - listitem [ref=f117e207]: Achievable
          - listitem [ref=f117e208]: Relevant
          - listitem [ref=f117e209]: Time-bound
