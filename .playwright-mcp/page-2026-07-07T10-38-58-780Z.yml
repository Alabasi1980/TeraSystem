    - generic [ref=f110e89]:
      - heading "Category management" [level=1] [ref=f110e90]
      - paragraph [ref=f110e92]: Discover the basic principles and aims of category management.
    - generic [ref=f110e95]:
      - generic [ref=f110e96]:
        - heading "What is category management?" [level=2] [ref=f110e97]
        - paragraph [ref=f110e98]: Many organisations ask ‘what is category management?’.
        - paragraph [ref=f110e99]: The answer is that category management is a powerful way of reimagining the way procurement works. It can be applied to almost every business and can make it more efficient and responsive
        - paragraph [ref=f110e100]: Category management means grouping related products into categories. Each category is managed as its own business unit. Each category is then treated as an independent business unit with its own strategy and goals. This makes it possible to manage products in a more structured way where they can be aligned with the wider needs of the business.
        - paragraph [ref=f110e101]: When it is done properly, category management can become a data-driven way of meeting customer demands and optimising the supply chain. In the long run, it can maximise consumer and organisational value.
        - heading "Category Management Definition" [level=4] [ref=f110e102]
        - paragraph [ref=f110e103]: The most widely used category management definition is that it is the process of dividing products into categories where they can be managed together
      - generic [ref=f110e106]:
        - heading "What value does it bring to organisations?" [level=2] [ref=f110e107]
        - generic [ref=f110e108]:
          - paragraph [ref=f110e109]: Category management brings clarity and focus to purchasing decisions.
          - paragraph [ref=f110e110]: Grouping products into categories means that purchasing processes within each category can be streamlined. Decisions will also have more clarity behind them. This should make it easier to negotiate with new and existing suppliers.
          - paragraph [ref=f110e111]: It involves understanding how category management principles work and the processes involved implementing them.
      - generic [ref=f110e114]:
        - heading "Starting the category management process" [level=2] [ref=f110e115]
        - paragraph [ref=f110e116]: Every product and service, every category, has its own characteristics. It is important to note that no two businesses or organisations will operate in the same way.
        - paragraph [ref=f110e117]: "That means the process of developing effective category management is going to be different for each use case. Despite this, there are some basic steps that most organisations can follow:"
        - list [ref=f110e118]:
          - listitem [ref=f110e119]:
            - strong [ref=f110e120]: Define
            - text: the category by clearly outlining the goods or services
          - listitem [ref=f110e121]:
            - strong [ref=f110e122]: Analyse
            - text: spend patterns and market dynamics using internal data and external intelligence
          - listitem [ref=f110e123]:
            - strong [ref=f110e124]: Engage
            - text: stakeholders to ensure alignment with wider business objectives
          - listitem [ref=f110e125]:
            - strong [ref=f110e126]: Develop and implement
            - text: a sourcing strategy with measurable goals and clear value drivers
          - listitem [ref=f110e127]:
            - strong [ref=f110e128]: Review and improve
            - text: performance through Key Performance Indicators (KPIs) and continuous supplier evaluation
        - paragraph [ref=f110e129]: Shifting from a reactive purchasing approach to strategic category management means procurement becomes a proactive business partner and commercial enabler.
      - generic [ref=f110e132]:
        - heading "What are the principles of category management?" [level=2] [ref=f110e133]
        - paragraph [ref=f110e134]: "The category management definition makes it clear how the business benefits can be felt across the entire organisation. It will now help to understand the three main principles that inform category management:"
        - heading "1. Customer-centric focus" [level=4] [ref=f110e135]
        - paragraph [ref=f110e136]: This is the key principle. Category management strategy needs to be closely coordinated with customer needs. Organisations that keep the customer at the centre of what they do will create better products and enjoy greater customer satisfaction.
        - paragraph [ref=f110e137]: You should also use data as the basis for decision-making, for strategy adjustments and to predict market trends.
        - heading "2. Cross-functional collaboration (engage and implement)" [level=4] [ref=f110e138]
        - paragraph [ref=f110e139]: Successful category management relies on collaboration across business units. This focus works best with regular, joint meetings, brainstorming sessions and joint goals to unify efforts.
        - heading "3. Insight-led strategy (analyse and review)" [level=4] [ref=f110e140]
        - paragraph [ref=f110e141]: Using analytics, businesses can anticipate market shifts and refine strategies. Using advanced analytics tools will generate data that can be used to adjust strategies and refine the company’s risk profile.
      - generic [ref=f110e144]:
        - heading "Tools to make category management work" [level=2] [ref=f110e145]
        - paragraph [ref=f110e146]: Successful category management relies on using tools that support strategic thinking, supplier evaluation, and data-driven decisions.
        - paragraph [ref=f110e147]:
          - text: The main tool is the
          - strong [ref=f110e148]:
            - link "CIPS Category Management Cycle" [ref=f110e149] [cursor=pointer]:
              - /url: /intelligence-hub/category-management/cycle
          - text: . It spans all stages from scoping to performance review and is designed to support strategic thinking while remaining practical and repeatable.
        - paragraph [ref=f110e150]: "There are also supporting tools. These include:"
        - list [ref=f110e151]:
          - listitem [ref=f110e152]:
            - strong [ref=f110e153]: Kraljic Matrix
            - text: ": Helps prioritise categories by supply risk and business impact"
          - listitem [ref=f110e154]:
            - strong [ref=f110e155]: ABC Analysis
            - text: ": Segments categories or suppliers by value and importance"
          - listitem [ref=f110e156]:
            - strong [ref=f110e157]: STEEPLED
            - text: "Analysis: Assesses macro-environmental factors that may affect sourcing"
          - listitem [ref=f110e158]:
            - strong [ref=f110e159]: "eSourcing Tools:"
            - text: Digital platforms that streamline sourcing and evaluation
          - listitem [ref=f110e160]:
            - strong [ref=f110e161]: "ERP and Procurement Systems:"
            - text: Enable centralised data, contract visibility, and automation of workflows
        - paragraph [ref=f110e162]: Together, these tools support procurement professionals in building robust, evidence led category strategies.
      - generic [ref=f110e165]:
        - 'heading "Real world examples: retail indirect services category management" [level=2] [ref=f110e166]'
        - paragraph [ref=f110e167]: One example of category management in practice can be found in retail. In this sector, indirect services like cleaning, security, and waste management are often split across many suppliers and often serve different locations.
        - paragraph [ref=f110e168]: By using category management principles, retailers can put these services into clearly defined categories. It can improve performance and reduce costs.
        - paragraph [ref=f110e169]: Applying the category management principles supports consistency across store locations and strengthens supplier accountability. It also enables all progress towards sustainability and compliance goals to be carefully monitored.
      - generic [ref=f110e172]:
        - heading "Case study" [level=2] [ref=f110e173]
        - paragraph [ref=f110e174]: A UK-based retailer applied this structure across its UK operations.
        - paragraph [ref=f110e175]: Its supplier base was reduced by 35%, and it increased service level compliance by 22%. Indirect spend was cut by 12% in just 18 months.
        - paragraph [ref=f110e176]: Success relied on consolidating categories and on working closely with store managers, legal, and ESG teams to embed both commercial and brand values into the sourcing strategies.
