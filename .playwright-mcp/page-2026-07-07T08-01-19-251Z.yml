          - generic [ref=f43e111]:
            - heading "تعريف ‏‫‏‫تخطيط موارد المؤسسات (ERP)" [level=2] [ref=f43e112]
            - paragraph [ref=f43e113]:
              - text: يشير
              - link "تخطيط موارد المؤسسات" [ref=f43e114] [cursor=pointer]:
