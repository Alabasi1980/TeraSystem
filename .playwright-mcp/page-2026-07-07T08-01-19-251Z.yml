              - strong [ref=f43e221]: النشئة التاريخية لـ ERP من التسعينات حتى الألفية الجديدة
              - text: من تسعينيات القرن العشرين حتى بدء القرن
              - link "الحادي والعشرين، زاد اعتماد حل تخطيط الموارد المؤسسية (ERP) سريعًا." [ref=f43e222] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Oracle_Enterprise_Resource_Planning_Cloud
              - text: . وفي الوقت نفسه، بدأت تكاليف تنفيذ
              - link "نظام تخطيط موارد المؤسسات (ERP)" [ref=f43e223] [cursor=pointer]:
                - /url: https://terillium.com/best-practices-for-an-oracle-erp-cloud-implementation/
              - text: في الزيادة. كانت الأجهزة المطلوبة لتشغيل البرنامج في منشآت الشركة، مع وجود أجهزة كبيرة في غرفة الخادم. وكانت تراخيص كل من الأجهزة والبرامج تتطلب استثمارات رأسمالية وانخفضت قيمتها على مدار فترة تتراوح من 5 إلى 10 سنوات. بالإضافة إلى ذلك، أرادت المؤسسات دائمًا تقريبًا تخصيص أنظمة ERP الخاصة بها لتناسب احتياجاتها الخاصة، مما استلزم نفقات إضافية تتمثل في الاستشاريين في البرامج والتدريب عليها.
            - paragraph [ref=f43e224]: وفي هذه الأثناء، كانت تكنولوجيا تخطيط موارد المؤسسات (ERP) تتطور لتشمل الإنترنت بجانب الميزات والوظائف الجديدة، مثل التحليلات المضمنة. وبمرور الوقت، اكتشفت العديد من المؤسسات أن أنظمة ERP المحلية لديها لم تواكب متطلبات الأمان الحديثة أو التقنيات الناشئة، مثل الهواتف الذكية.
          - generic [ref=f43e226]:
            - heading "Cloud ERPنموذج جديد لتسليم نظام ERP" [level=2] [ref=f43e227]
            - paragraph [ref=f43e228]:
              - strong [ref=f43e229]: البرامج كخدمة
              - text: أدخل السحابة — وخاصة،
              - link "نموذج تسليم البرامج كخدمة" [ref=f43e230] [cursor=pointer]:
                - /url: /ae-ar/applications/
              - text: لحل تخطيط الموارد المؤسسية (ERP). عند تقديم برنامج ERP كخدمة في السحابة، يتم تشغيله على شبكة من الخوادم البعيدة، وليس داخل غرفة الخادم بالشركة. يعمل موفر الخدمة في السحابة على تصحيح البرنامج وإدارته وتحديثه عدة مرات في السنة - بدلاً من الترقية باهظة الثمن كل فترة تتراوح من 5 إلى 10 سنوات مع أحد الأنظمة المحلية. يمكن للسحابة تقليل كل من النفقات التشغيلية (OpEx) والنفقات الرأسمالية (CapEx)، لأنها تلغي حاجة الشركات إلى شراء البرامج والأجهزة، أو تعيين موظفين إضافيين في تقنية المعلومات. يمكن استثمار هذه الموارد، بدلاً من ذلك، في فرص جديدة للأعمال، والمؤسسة تبقى دومًا على اطّلاع بأحدث برامج نظام تخطيط موارد المؤسسات (ERP). يمكن للموظفين تحويل تركيزهم من إدارة تقنية المعلومات إلى المهام ذات القيمة المضافة الأكبر، مثل الابتكار والنمو.
            - link "ما المقصود بـ ERP‎ للبرمجيات كخدمة (SaaS)؟" [ref=f43e233] [cursor=pointer]:
