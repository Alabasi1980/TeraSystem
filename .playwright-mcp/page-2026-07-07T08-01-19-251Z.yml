          - generic [ref=f43e211]:
            - heading "بيان موجز عن تاريخ تخطيط موارد المؤسسة" [level=2] [ref=f43e212]
            - paragraph [ref=f43e213]:
              - strong [ref=f43e214]: من البطاقات الورقية إلى الأجهزة المحمولة‬‏‫
              - text: ‏‫يعود
              - link "تاريخ ERP إلى أكثر من 100 عامًا." [ref=f43e215] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Enterprise_resource_planning
              - text: ففي 1913، قام المهندس Ford Whitman Harris بتطوير ما صار يُعرف بنموذج "كمية الترتيب الاقتصادي" (EOQ)، وهو نظام صناعي يعتمد على الأوراق لجدولة الإنتاج. وقد استمرت EOQ طيلة عقود ترمز إلى الصناعة. قام Toolmaker Black وDecker بتغيير اللعبة في عام 1964 عندما كانت الشركة الأولى في تبني متطلبات المواد التي تخطط لحل (MRP) الذي ضم مفاهيم EOQ باستخدام جهاز كمبيوتر بإطار رئيسي.
            - paragraph [ref=f43e216]: وقد بقي MRP (حل تخطيط متطلبات المواد) معيار التصنيع إلى أن تم تطوير حل تخطيط موارد التصنيع (يُطلق عليه MRP II) في عام 1983. وقد تميز حل تخطيط موارد التصنيع (MRP II) "بالوحدات" باعتبارها مكونًا هندسيًا برمجيًا أساسيًا ودمج مكونات التصنيع الرئيسية التي تشمل الشراء وفوترة المواد والجدولة وإدارة العقود. تم تكامل مختلف المهام الصناعية لأول مرة في نظام مشترك. قدمت MRP II رؤية ساحرة حول كيفية استفادة المؤسسات من البرنامج في مشاركة بيانات المؤسسة ودمجها وتفعيل الكفاءة التشغيلية مع تخطيط إنتاجي أفضل، وانخفاض المخزون، ونفايات أقل (الخردة). وحيث انتشرت تكنولوجيا الكمبيوتر خلال السبعينات والثمانينات، تم تطوير المفاهيم المشابهة لـ MRP II بهدف معالجة الأنشطة التجارية غير التصنيع وأموال الشركات وإدارة علاقات العملاء وبيانات الموارد البشرية. وبحلول عام 1990، كان للمحللين التقنيين اسم لهذه الفئة الجديدة من برامج إدارة الشركة - هو تخطيط موارد المؤسسات.
